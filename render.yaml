# Render Blueprint — deploy backend + Postgres from GitHub
# Docs: docs/DEPLOY_PRODUCTION.md

databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
    plan: free

services:
  - type: web
    name: portfolio-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/portfolio-nav-content
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: PORTFOLIO_CORS_ALLOWED_ORIGINS
        value: https://vinay-moguloju.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
